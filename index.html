<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mammobus Prospect Pipeline</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--p:#4B2D83;--pd:#3a2268;--pm:#6B4DA0;--pl:#8E6DBF;--lav:#E8E0F5;--lav2:#F4F0FA;--w:#fff;--tx:#2D1A50;--txm:#5a4a7a;--txl:#9080b0;--br:#D5C8ED;--bg:#F7F4FD;}
body{font-family:Arial,sans-serif;background:var(--bg);color:var(--tx);font-size:13px}
/* spacer */
.top-spacer{height:80px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:11px;color:#c0b8d4;letter-spacing:.05em;border-bottom:1px solid var(--lav)}
/* header */
header{background:var(--p);padding:0 20px;display:flex;align-items:stretch;justify-content:space-between;flex-wrap:wrap}
.hleft{display:flex;align-items:center;gap:14px;padding:12px 0}
.logo-icon{width:36px;height:36px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-text h1{font-size:15px;font-weight:700;color:#fff;line-height:1.2}
.logo-text p{font-size:10px;color:rgba(255,255,255,.6)}
.hdiv{width:1px;background:rgba(255,255,255,.2);margin:10px 0}
.hsub{padding-left:14px}.hsub span{font-size:12px;color:rgba(255,255,255,.85);font-weight:600;display:block}
.hsub small{font-size:10px;color:rgba(255,255,255,.5)}
.toolbar{display:flex;gap:8px;align-items:center;padding:12px 0}
.toolbar input{border:1px solid rgba(255,255,255,.3);border-radius:4px;padding:6px 10px;font-size:12px;width:190px;background:rgba(255,255,255,.12);color:#fff}
.toolbar input::placeholder{color:rgba(255,255,255,.45)}
.btn{background:#fff;color:var(--p);border:none;padding:7px 14px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:700}
.btn:hover{background:var(--lav)}
.btn.ol{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.5)}
.btn.ol:hover{background:rgba(255,255,255,.1)}
.btn.danger{background:#fff;color:#8B1A1A;border:1.5px solid #C84040}
/* stats */
.stats{display:flex;gap:8px;padding:10px 20px;background:var(--pd);flex-wrap:wrap}
.stat{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.15);border-radius:6px;padding:8px 14px;min-width:95px;text-align:center;cursor:pointer;transition:.15s;user-select:none}
.stat:hover{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.4)}
.stat.active{background:rgba(255,255,255,.28);border-color:#fff;box-shadow:0 0 0 2px rgba(255,255,255,.3)}
.stat-n{font-size:20px;font-weight:700;color:#fff}
.stat-l{font-size:10px;color:rgba(255,255,255,.6);margin-top:2px}
.filter-bar{display:flex;align-items:center;gap:8px;padding:6px 20px;background:var(--p);border-bottom:1px solid var(--lav);flex-wrap:wrap}
.filter-label{font-size:11px;color:rgba(255,255,255,.7)}
.filter-tag{font-size:11px;font-weight:600;background:rgba(255,255,255,.2);color:#fff;padding:3px 10px;border-radius:12px;display:flex;align-items:center;gap:5px}
.filter-clear{background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:13px;line-height:1;padding:0}
.filter-clear:hover{color:#fff}
/* board */
.board{display:flex;gap:10px;padding:14px 20px;overflow-x:auto;align-items:flex-start;min-height:calc(100vh - 220px)}
.col{flex:0 0 215px;background:#fff;border-radius:8px;border:1px solid var(--br);overflow:hidden}
.col-hd{padding:9px 12px;font-size:12px;font-weight:700;display:flex;justify-content:space-between;align-items:center;color:#fff}
.col-cnt{background:rgba(255,255,255,.25);border-radius:10px;padding:1px 7px;font-size:11px}
.col-body{padding:8px;min-height:80px}
.card{background:#fff;border-radius:6px;border:1px solid var(--br);margin-bottom:8px;cursor:pointer;transition:.15s}
.card:hover{box-shadow:0 2px 10px rgba(75,45,131,.15);border-color:var(--pl)}
.card-top{padding:10px 10px 6px}
.card-name{font-size:13px;font-weight:700;color:var(--tx);margin-bottom:2px}
.card-meta{font-size:11px;color:var(--txl)}
.card-mid{padding:4px 10px 4px;display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;background:var(--lav);color:var(--p)}
.tag.hi{background:#F5E8E8;color:#7A1A1A}
.tag.mo{background:#FBF0E0;color:#6B4000}
.tag.lo{background:#E8F5EE;color:#1A5C36}
.card-prog{padding:4px 10px 8px}
.prog-lbl{font-size:10px;color:var(--txl);margin-bottom:3px}
.prog-bar{height:4px;background:var(--lav);border-radius:2px;overflow:hidden;margin-bottom:4px}
.prog-fill{height:100%;border-radius:2px;background:var(--p);transition:width .3s}
.review-badge{font-size:10px;padding:2px 6px;border-radius:4px;display:inline-flex;align-items:center;gap:3px;margin-top:2px}
.review-badge.due{background:#F5E8E8;color:#7A1A1A}
.review-badge.ok{background:#E8F5EE;color:#1A5C36}
.add-card{background:none;border:1.5px dashed var(--br);border-radius:6px;width:100%;padding:8px;color:var(--txl);font-size:12px;cursor:pointer;margin-top:2px;transition:.15s}
.add-card:hover{border-color:var(--p);color:var(--p)}
/* modal */
.ov{position:fixed;inset:0;background:rgba(45,26,80,.5);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto}
.ov.open{display:flex}
.modal{background:#fff;border-radius:10px;width:100%;max-width:920px;margin:auto;border:1px solid var(--br);display:flex;flex-direction:column;max-height:calc(100vh - 32px)}
.mhd{background:var(--p);color:#fff;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;border-radius:10px 10px 0 0}
.mhd h2{font-size:14px;font-weight:700}
.mclose{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;opacity:.8;line-height:1}
.mclose:hover{opacity:1}
.mbody{display:flex;flex:1;overflow:hidden}
.mcol-l{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;border-right:1px solid var(--br)}
.mcol-r{width:280px;flex-shrink:0;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;background:var(--lav2)}
.msec{background:#fff;border:1px solid var(--br);border-radius:8px;padding:14px}
.msec h4{font-size:11px;font-weight:700;color:var(--p);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;padding-bottom:6px;border-bottom:1.5px solid var(--lav)}
.mfoot{padding:12px 18px;border-top:1px solid var(--br);display:flex;justify-content:space-between;gap:8px;background:#fff;flex-shrink:0;border-radius:0 0 10px 10px}
.form-row{display:flex;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.fg{display:flex;flex-direction:column;gap:3px;flex:1;min-width:120px}
.fg label{font-size:11px;font-weight:700;color:var(--txm)}
.fg input,.fg select,.fg textarea{border:1px solid var(--br);border-radius:4px;padding:6px 8px;font-size:12px;font-family:Arial,sans-serif;color:var(--tx);width:100%}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--p)}
.fg textarea{resize:vertical;min-height:80px}
.fg input[readonly]{background:var(--lav2);cursor:default}
.stage-sel{display:flex;gap:6px;flex-wrap:wrap}
.stbtn{border:1.5px solid var(--br);border-radius:20px;padding:5px 12px;font-size:11px;cursor:pointer;background:#fff;color:var(--txm);font-weight:600;transition:.15s}
.stbtn:hover{border-color:var(--p);color:var(--p)}
.stbtn.active{background:var(--p);color:#fff;border-color:var(--p)}
.cl-wrap{background:var(--lav2);border:1px solid var(--br);border-radius:6px;padding:12px;margin-top:8px}
.cl-title{font-size:11px;font-weight:700;color:var(--p);margin-bottom:8px;display:flex;justify-content:space-between}
.cl-prog-txt{font-size:10px;font-weight:400;color:var(--txl)}
.chk-item{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--br)}
.chk-item:last-child{border-bottom:none}
.chk-item input[type=checkbox]{margin-top:2px;accent-color:var(--p);width:14px;height:14px;flex-shrink:0;cursor:pointer}
.chk-item label{font-size:12px;color:var(--tx);cursor:pointer;line-height:1.4}
.chk-item label.done{text-decoration:line-through;color:var(--txl)}
/* upload */
.upzone{border:2px dashed var(--br);border-radius:8px;padding:20px 12px;text-align:center;cursor:pointer;transition:.2s;background:#fff;margin-bottom:10px}
.upzone:hover,.upzone.drag{border-color:var(--p);background:var(--lav)}
.upzone svg{display:block;margin:0 auto 8px;opacity:.5}
.upzone p{font-size:12px;color:var(--txm);font-weight:600;margin-bottom:3px}
.upzone small{font-size:10px;color:var(--txl);line-height:1.5}
.flist{display:flex;flex-direction:column;gap:6px}
.fitem{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--br);border-radius:6px;padding:8px 10px}
.fthumb{width:38px;height:38px;border-radius:4px;object-fit:cover;flex-shrink:0;border:1px solid var(--br)}
.ficon{width:38px;height:38px;border-radius:4px;background:var(--lav);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;font-weight:700;color:var(--p)}
.finfo{flex:1;min-width:0}
.fname{font-size:12px;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fmeta{font-size:10px;color:var(--txl);margin-top:1px}
.fbtns{display:flex;gap:3px;flex-shrink:0}
.fbtn{background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:4px;font-size:13px;color:var(--txl)}
.fbtn:hover{background:var(--lav);color:var(--p)}
.fbtn.del:hover{background:#FEF0F0;color:#8B1A1A}
.ubadge{font-size:9px;background:#FAEEDA;color:#633806;padding:1px 5px;border-radius:8px;margin-left:4px}
.empty-files{font-size:11px;color:var(--txl);text-align:center;padding:8px 0}
.imgprev{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.imgprev img{max-width:92%;max-height:92vh;border-radius:8px}
.imgprev-close{position:fixed;top:14px;right:18px;background:#fff;border:none;border-radius:50%;width:32px;height:32px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#333;font-weight:700}
</style>
</head>
<body>

<div class="top-spacer">&#8595;&nbsp; Scroll down to view the Mammobus Pipeline Tracker &nbsp;&#8595;</div>

<header>
  <div class="hleft">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="logo-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M12 3C12 3 6 7 6 13a6 6 0 0012 0C18 7 12 3 12 3z" fill="#4B2D83"/>
          <path d="M12 8v8M9 11h6" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="logo-text"><h1>Singapore Cancer Society</h1><p>Minimising Cancer, Maximising Lives</p></div>
    </div>
    <div class="hdiv"></div>
    <div class="hsub"><span>Mammobus Prospect Pipeline</span><small>Community Mammobus Programme — Engagement Tracker</small></div>
  </div>
  <div class="toolbar">
    <input type="text" id="search-input" placeholder="Search by name..." oninput="filterCards()">
    <button class="btn ol" onclick="exportData()">Export CSV</button>
    <button class="btn" onclick="openNew()">+ Add Prospect</button>
  </div>
</header>

<div class="stats" id="stats-bar"></div>
<div class="filter-bar" id="filter-bar" style="display:none"></div>
<div class="board" id="board"></div>

<div class="ov" id="ov" onclick="ovClick(event)">
  <div class="modal">
    <div class="mhd"><h2 id="modal-title">Prospect</h2><button class="mclose" onclick="closeModal()">&#x2715;</button></div>
    <div class="mbody">
      <div class="mcol-l" id="mcol-l"></div>
      <div class="mcol-r" id="mcol-r"></div>
    </div>
    <div class="mfoot">
      <button class="btn danger" id="del-btn" onclick="deleteProspect()" style="display:none">Delete</button>
      <div style="display:flex;gap:8px;margin-left:auto">
        <button class="btn" style="background:#fff;color:var(--p);border:1px solid var(--br)" onclick="closeModal()">Cancel</button>
        <button class="btn" onclick="saveProspect()">Save</button>
      </div>
    </div>
  </div>
</div>

<script>
const STAGES=[
  {id:'unaware',  label:'Unaware',   shade:'#7B5EA7'},
  {id:'aware',    label:'Aware',     shade:'#6B4DA0'},
  {id:'enquiring',label:'Enquiring', shade:'#5C3D95'},
  {id:'qualified',label:'Qualified', shade:'#4B2D83'},
  {id:'booked',   label:'Booked',    shade:'#3a2268'},
  {id:'screened', label:'Screened',  shade:'#2D1A50'},
];
const CL={
  unaware:['Community source or referral channel identified','Initial contact made (event / flyer / GP mention)','Basic demographic noted (approx. age, area)','Language preference identified','Added to awareness campaign list'],
  aware:['Has heard of Mammobus or breast screening','Interest level gauged (curious / considering)','Programme overview shared (benefits, subsidy)','BCF / SCS informational materials sent','Barrier type identified (fear / cost / time / other)','Follow-up date scheduled'],
  enquiring:['Full name and date of birth collected','NRIC / FIN number recorded','Residency status confirmed (SC / PR / Foreigner)','Mobile number and email captured','Age eligibility confirmed (40 years and above)','Not currently pregnant or breastfeeding','No active breast symptoms present','Date of last mammogram established','Healthier SG or CHAS enrolment checked','First-time screener status noted'],
  qualified:['All eligibility criteria met and documented','Subsidy pathway confirmed (Healthier SG / CHAS / self-pay)','Preferred screening date and time captured','Mammobus location / event communicated','Pre-screening instructions shared (no deodorant etc.)','What to bring explained (NRIC, two-piece clothing)','COVID vaccination date noted if within 6 weeks','Family history of breast cancer documented','Any implants or prior surgery flagged for radiographer','Consent to data collection obtained (PDPA)'],
  booked:['Appointment confirmation sent (SMS / email)','Reminder sent 1 week before appointment','Reminder sent 3 days before appointment','No-show deposit process explained','Transport or logistics support offered if needed','Emergency contact details collected','Day-of checklist shared with participant','Coordinator notified of any special requirements'],
  screened:['Attendance confirmed on screening day','Screening completed without issues','Results communication timeline explained','Results sent / received by participant','Abnormal results — referral pathway activated','Normal results — next screening date communicated','Participant satisfaction / feedback collected','Peer referral ask made (refer a friend)','Re-engagement reminder set (12 or 24 months)','Record updated in system'],
};

const PERIOD_LABELS={'6m':'6 months','1y':'1 year','3y':'3 years','5y':'5 years'};

let prospects=[
  {id:1, name:'Tan Mei Ling',          age:52,nric:'S****567A',status:'SC',risk:'High',    stage:'booked',    first:true, reviewPeriod:'1y', reviewDate:'2027-04-09',notes:'Family history — mother had breast cancer. Very motivated.',checks:{booked:[true,true,true,false,false,true,false,false]},files:[]},
  {id:2, name:'Siti Rahimah Bte Omar', age:45,nric:'S****234B',status:'SC',risk:'Moderate',stage:'qualified', first:false,reviewPeriod:'1y', reviewDate:'2027-04-09',notes:'Enrolled in Healthier SG. Prefers Malay-speaking coordinator.',checks:{qualified:[true,true,true,true,true,false,false,false,false,false]},files:[]},
  {id:3, name:'Lim Ah Kow',            age:48,nric:'S****891C',status:'PR',risk:'Low',     stage:'enquiring', first:true, reviewPeriod:'6m', reviewDate:'2026-10-09',notes:'Came from void deck flyer. Needs Mandarin support.',checks:{enquiring:[true,true,true,true,true,false,false,false,false,false]},files:[]},
  {id:4, name:'Priya d/o Subramaniam', age:41,nric:'S****445D',status:'SC',risk:'Low',     stage:'aware',     first:true, reviewPeriod:'',   reviewDate:'',           notes:'Afraid of results. Referred to BCF counsellor.',checks:{},files:[]},
  {id:5, name:'Wong Li Fang',          age:55,nric:'S****320E',status:'SC',risk:'High',    stage:'screened',  first:false,reviewPeriod:'2y', reviewDate:'2028-04-09',notes:'Results normal. Re-engagement set for 2027.',checks:{screened:[true,true,true,true,true,true,true,true,true,true]},files:[]},
  {id:6, name:'Hamidah Bte Yusof',     age:50,nric:'S****776F',status:'SC',risk:'Moderate',stage:'unaware',   first:true, reviewPeriod:'',   reviewDate:'',           notes:'Met at Bishan CC community event.',checks:{},files:[]},
  {id:7, name:'Ng Boon Hwee',          age:60,nric:'S****103G',status:'SC',risk:'High',    stage:'screened',  first:false,reviewPeriod:'6m', reviewDate:'2026-10-09',notes:'Results showed calcification — referred to NCCS.',checks:{screened:[true,true,true,true,false,false,true,false,true,false]},files:[]},
  {id:8, name:'Kavitha Rajendran',     age:43,nric:'S****558H',status:'SC',risk:'Moderate',stage:'booked',    first:true, reviewPeriod:'1y', reviewDate:'2027-04-09',notes:'Workplace booking via Changi Airport Group. Confirmed 15 Apr.',checks:{booked:[true,true,false,true,false,false,false,false]},files:[]},
  {id:9, name:'Chen Xiao Hui',         age:47,nric:'S****299J',status:'PR',risk:'Low',     stage:'enquiring', first:true, reviewPeriod:'6m', reviewDate:'2026-10-09',notes:'Heard from colleague. Unsure about PR subsidy rates.',checks:{enquiring:[true,true,true,false,true,true,true,false,false,false]},files:[]},
  {id:10,name:'Nurul Ain Bte Rosli',   age:53,nric:'S****641K',status:'SC',risk:'High',    stage:'qualified', first:false,reviewPeriod:'1y', reviewDate:'2027-04-09',notes:'Had a scare 3 years ago — benign cyst. Overdue for screening.',checks:{qualified:[true,true,true,true,true,true,true,true,false,false]},files:[]},
  {id:11,name:'Lee Geok Eng',          age:66,nric:'S****088L',status:'SC',risk:'Moderate',stage:'aware',     first:false,reviewPeriod:'',   reviewDate:'',           notes:'Referred by daughter. Last screened 3 years ago.',checks:{aware:[true,true,false,false,false,false]},files:[]},
  {id:12,name:'Fatimah Bte Hashim',    age:44,nric:'S****714M',status:'SC',risk:'Low',     stage:'unaware',   first:true, reviewPeriod:'',   reviewDate:'',           notes:'Spotted at Geylang Serai Bazaar booth.',checks:{},files:[]},
];
let nextId=13,editId=null,filterTerm='',pendingFiles=[],activeFilter=null;

// filter definitions
const FILTERS={
  total:     {label:'All prospects',       fn:()=>true},
  booked:    {label:'Appointments booked', fn:p=>p.stage==='booked'},
  screened:  {label:'Screened',            fn:p=>p.stage==='screened'},
  highrisk:  {label:'High risk',           fn:p=>p.risk==='High'},
  firsttime: {label:'First-time screeners',fn:p=>p.first===true},
  conversion:{label:'Screened',            fn:p=>p.stage==='screened'},
};

function getChecks(p,st){
  if(!p.checks)p.checks={};
  if(!p.checks[st])p.checks[st]=CL[st].map(()=>false);
  while(p.checks[st].length<CL[st].length)p.checks[st].push(false);
  return p.checks[st];
}
function progOf(p,st){const c=getChecks(p,st),d=c.filter(Boolean).length;return{d,t:c.length,pct:Math.round(d/c.length*100)};}
function fmtSz(b){return b>1048576?(b/1048576).toFixed(1)+' MB':(b/1024).toFixed(0)+' KB';}
function extOf(n){return(n.split('.').pop()||'').toUpperCase().slice(0,4);}
function isImg(t){return t&&t.startsWith('image/');}

function fmtDate(d){
  if(!d)return'';
  const [y,m,dy]=d.split('-');
  return `${dy}/${m}/${y}`;
}
function isOverdue(d){
  if(!d)return false;
  return new Date(d)<new Date();
}

/* ── Board ── */
function setFilter(key){
  activeFilter = activeFilter===key ? null : key;
  renderStats();
  renderBoard();
  const fb=document.getElementById('filter-bar');
  if(activeFilter){
    fb.style.display='flex';
    fb.innerHTML=`<span class="filter-label">Filtering by:</span>
      <span class="filter-tag">${FILTERS[activeFilter].label}
        <button class="filter-clear" onclick="clearFilter()">&#x2715;</button>
      </span>`;
  } else {
    fb.style.display='none';
  }
}

function clearFilter(){
  activeFilter=null;
  renderStats();
  renderBoard();
  document.getElementById('filter-bar').style.display='none';
}

function renderBoard(){
  const board=document.getElementById('board');
  board.innerHTML='';
  const term=filterTerm.toLowerCase();
  const filterFn=activeFilter?FILTERS[activeFilter].fn:()=>true;
  STAGES.forEach(st=>{
    const items=prospects.filter(p=>p.stage===st.id&&(!term||p.name.toLowerCase().includes(term))&&filterFn(p));
    const col=document.createElement('div');
    col.className='col';
    col.innerHTML=`<div class="col-hd" style="background:${st.shade}">${st.label}<span class="col-cnt">${items.length}</span></div>
      <div class="col-body">${items.map(p=>cardHTML(p,st)).join('')}<button class="add-card" onclick="openNew('${st.id}')">+ Add</button></div>`;
    board.appendChild(col);
  });
  renderStats();
}

function cardHTML(p,st){
  const pg=progOf(p,p.stage);
  const rc=p.risk==='High'?'hi':p.risk==='Moderate'?'mo':'lo';
  const hasReview=p.reviewDate&&p.reviewDate!=='';
  const overdue=isOverdue(p.reviewDate);
  const reviewHTML=hasReview
    ?`<div class="review-badge ${overdue?'due':'ok'}">&#128197; ${PERIOD_LABELS[p.reviewPeriod]||p.reviewPeriod} &nbsp;&middot;&nbsp; ${fmtDate(p.reviewDate)}</div>`
    :'';
  const fileCount=(p.files&&p.files.length)?`<span class="tag" style="background:#EEE8FF">&#128206; ${p.files.length}</span>`:'';
  return `<div class="card" onclick="openEdit(${p.id})">
    <div class="card-top"><div class="card-name">${p.name}</div><div class="card-meta">Age ${p.age} &middot; ${p.status}${p.first?' &middot; &#9733; First':''}</div></div>
    <div class="card-mid"><span class="tag">${p.status}</span><span class="tag ${rc}">${p.risk} risk</span>${fileCount}</div>
    <div class="card-prog">
      <div class="prog-lbl">${pg.d}/${pg.t} tasks &middot; ${pg.pct}%</div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pg.pct}%;background:${st.shade}"></div></div>
      ${reviewHTML}
    </div>
  </div>`;
}

function renderStats(){
  const t=prospects.length,bk=prospects.filter(p=>p.stage==='booked').length,sc=prospects.filter(p=>p.stage==='screened').length,hi=prospects.filter(p=>p.risk==='High').length,fi=prospects.filter(p=>p.first).length;
  const stats=[
    {key:'total',     n:t,                                      l:'Total prospects'},
    {key:'booked',    n:bk,                                     l:'Appointments booked'},
    {key:'screened',  n:sc,                                     l:'Screened'},
    {key:'highrisk',  n:hi,                                     l:'High risk'},
    {key:'firsttime', n:fi,                                     l:'First-time screeners'},
    {key:'conversion',n:Math.round(sc/Math.max(t,1)*100)+'%',  l:'Conversion rate'},
  ];
  document.getElementById('stats-bar').innerHTML=stats.map(s=>
    `<div class="stat ${activeFilter===s.key?'active':''}" onclick="setFilter('${s.key}')">
      <div class="stat-n">${s.n}</div>
      <div class="stat-l">${s.l}</div>
    </div>`
  ).join('');
}

/* ── Modal ── */
function buildLeft(p,st){
  const checks=p?getChecks(p,st):CL[st].map(()=>false);
  const done=checks.filter(Boolean).length;
  return `
  <div class="msec">
    <h4>Personal details</h4>
    <div class="form-row">
      <div class="fg"><label>Full name *</label><input id="f-name" type="text" value="${p?p.name:''}" placeholder="e.g. Tan Mei Ling"></div>
      <div class="fg" style="flex:0 0 80px"><label>Age *</label><input id="f-age" type="number" value="${p?p.age:''}" placeholder="45" min="18" max="100"></div>
    </div>
    <div class="form-row">
      <div class="fg"><label>NRIC / FIN</label><input id="f-nric" type="text" value="${p?p.nric:''}" placeholder="S****567A"></div>
      <div class="fg"><label>Residency *</label><select id="f-status">
        <option value="SC" ${p&&p.status==='SC'?'selected':''}>Singapore Citizen</option>
        <option value="PR" ${p&&p.status==='PR'?'selected':''}>Permanent Resident</option>
        <option value="FG" ${p&&p.status==='FG'?'selected':''}>Foreigner</option>
      </select></div>
    </div>
    <div class="form-row">
      <div class="fg"><label>Risk level *</label><select id="f-risk">
        <option value="Low"      ${p&&p.risk==='Low'?     'selected':''}>Low</option>
        <option value="Moderate" ${p&&p.risk==='Moderate'?'selected':''}>Moderate</option>
        <option value="High"     ${p&&p.risk==='High'?    'selected':''}>High</option>
      </select></div>
      <div class="fg"><label>First-time screener?</label><select id="f-first">
        <option value="1" ${p&&p.first? 'selected':''}>Yes</option>
        <option value="0" ${p&&!p.first?'selected':''}>No</option>
      </select></div>
    </div>
    <div class="form-row">
      <div class="fg"><label>Review period</label>
        <select id="f-period" onchange="calcReviewDate()">
          <option value="" ${!p||!p.reviewPeriod?'selected':''}>-- Select --</option>
          <option value="6m" ${p&&p.reviewPeriod==='6m'?'selected':''}>6 months</option>
          <option value="1y" ${p&&p.reviewPeriod==='1y'?'selected':''}>1 year</option>
          <option value="3y" ${p&&p.reviewPeriod==='3y'?'selected':''}>3 years</option>
          <option value="5y" ${p&&p.reviewPeriod==='5y'?'selected':''}>5 years</option>
        </select>
      </div>
      <div class="fg"><label>Next review date</label>
        <input id="f-review" type="date" value="${p&&p.reviewDate?p.reviewDate:''}" readonly>
      </div>
    </div>
  </div>
  <div class="msec">
    <h4>Pipeline stage</h4>
    <div class="stage-sel">${STAGES.map(s=>`<button class="stbtn ${s.id===st?'active':''}" onclick="switchStage('${s.id}')">${s.label}</button>`).join('')}</div>
    <input type="hidden" id="f-stage" value="${st}">
  </div>
  <div class="msec">
    <h4>Stage checklist</h4>
    <div class="cl-wrap" id="cl-wrap">
      <div class="cl-title"><span>${STAGES.find(s=>s.id===st).label} — tasks</span><span class="cl-prog-txt" id="cl-prog">${done} / ${CL[st].length} completed</span></div>
      ${CL[st].map((t,i)=>`<div class="chk-item"><input type="checkbox" id="ck${i}" ${checks[i]?'checked':''} onchange="updProg()"><label for="ck${i}" class="${checks[i]?'done':''}">${t}</label></div>`).join('')}
    </div>
  </div>
  <div class="msec">
    <h4>Case notes</h4>
    <div class="fg"><textarea id="f-notes" placeholder="Case notes, barriers, follow-up actions...">${p?p.notes:''}</textarea></div>
  </div>`;
}

function buildRight(p){
  return `
  <div class="msec" style="flex:1">
    <h4>Documents &amp; files</h4>
    <div class="upzone" id="upzone" onclick="document.getElementById('fi').click()" ondragover="dOver(event)" ondragleave="dLeave(event)" ondrop="dDrop(event)">
      <input type="file" id="fi" multiple accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.txt" style="display:none" onchange="handleFiles(this.files)">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#4B2D83" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <p>Click or drag &amp; drop</p>
      <small>Images &middot; PDF &middot; Word &middot; Excel &middot; TXT<br>Max 10 MB per file</small>
    </div>
    <div class="flist" id="flist"></div>
  </div>`;
}

function calcReviewDate(){
  const v=document.getElementById('f-period').value;
  const rd=document.getElementById('f-review');
  if(!v){rd.value='';return;}
  const d=new Date();
  if(v==='6m')d.setMonth(d.getMonth()+6);
  else if(v==='1y')d.setFullYear(d.getFullYear()+1);
  else if(v==='3y')d.setFullYear(d.getFullYear()+3);
  else if(v==='5y')d.setFullYear(d.getFullYear()+5);
  rd.value=d.toISOString().split('T')[0];
}

function renderFileList(){
  const el=document.getElementById('flist');if(!el)return;
  const p=editId?prospects.find(x=>x.id===editId):null;
  const saved=(p&&p.files)||[];
  const all=[...saved,...pendingFiles];
  if(!all.length){el.innerHTML=`<div class="empty-files">No files attached yet.</div>`;return;}
  el.innerHTML=all.map((f,i)=>{
    const isPend=i>=saved.length;
    const thumb=isImg(f.type)?`<img class="fthumb" src="${f.dataUrl}" alt="${f.name}">`:`<div class="ficon">${extOf(f.name)}</div>`;
    const badge=isPend?`<span class="ubadge">unsaved</span>`:'';
    return `<div class="fitem">${thumb}<div class="finfo"><div class="fname">${f.name}${badge}</div><div class="fmeta">${fmtSz(f.size)}</div></div>
      <div class="fbtns"><button class="fbtn" onclick="viewFile(${i})">&#128065;</button><button class="fbtn" onclick="dlFile(${i})">&#8681;</button><button class="fbtn del" onclick="rmFile(${i})">&#x2715;</button></div></div>`;
  }).join('');
}

function handleFiles(fl){
  Array.from(fl).forEach(f=>{
    if(f.size>10*1024*1024){alert(f.name+' exceeds 10MB.');return;}
    const r=new FileReader();
    r.onload=e=>{pendingFiles.push({name:f.name,size:f.size,type:f.type,dataUrl:e.target.result});renderFileList();};
    r.readAsDataURL(f);
  });
  document.getElementById('fi').value='';
}
function dOver(e){e.preventDefault();document.getElementById('upzone').classList.add('drag');}
function dLeave(){document.getElementById('upzone').classList.remove('drag');}
function dDrop(e){e.preventDefault();dLeave();handleFiles(e.dataTransfer.files);}
function viewFile(i){
  const p=editId?prospects.find(x=>x.id===editId):null;
  const all=[...(p&&p.files||[]),...pendingFiles];const f=all[i];if(!f)return;
  if(isImg(f.type)){const ov=document.createElement('div');ov.className='imgprev';ov.innerHTML=`<button class="imgprev-close" onclick="this.parentNode.remove()">&#x2715;</button><img src="${f.dataUrl}" alt="${f.name}">`;ov.onclick=e=>{if(e.target===ov)ov.remove();};document.body.appendChild(ov);}
  else{const a=document.createElement('a');a.href=f.dataUrl;a.target='_blank';a.click();}
}
function dlFile(i){const p=editId?prospects.find(x=>x.id===editId):null;const all=[...(p&&p.files||[]),...pendingFiles];const f=all[i];if(!f)return;const a=document.createElement('a');a.href=f.dataUrl;a.download=f.name;a.click();}
function rmFile(i){const p=editId?prospects.find(x=>x.id===editId):null;const saved=(p&&p.files)||[];if(i<saved.length){if(!confirm('Remove "'+saved[i].name+'"?'))return;saved.splice(i,1);if(p)p.files=saved;}else pendingFiles.splice(i-saved.length,1);renderFileList();}

function switchStage(stId){
  const p=editId?prospects.find(x=>x.id===editId):null;
  document.getElementById('f-stage').value=stId;
  document.querySelectorAll('.stbtn').forEach(b=>b.classList.toggle('active',b.textContent.trim()===STAGES.find(s=>s.id===stId).label));
  const ex=(p&&p.checks&&p.checks[stId])?p.checks[stId]:CL[stId].map(()=>false);
  const done=ex.filter(Boolean).length;
  document.getElementById('cl-wrap').innerHTML=`
    <div class="cl-title"><span>${STAGES.find(s=>s.id===stId).label} — tasks</span><span class="cl-prog-txt" id="cl-prog">${done} / ${CL[stId].length} completed</span></div>
    ${CL[stId].map((t,i)=>`<div class="chk-item"><input type="checkbox" id="ck${i}" ${ex[i]?'checked':''} onchange="updProg()"><label for="ck${i}" class="${ex[i]?'done':''}">${t}</label></div>`).join('')}`;
}

function updProg(){
  const stId=document.getElementById('f-stage').value;
  let done=0;const total=CL[stId].length;
  for(let i=0;i<total;i++){const cb=document.getElementById('ck'+i);if(cb&&cb.checked){done++;if(cb.nextElementSibling)cb.nextElementSibling.className='done';}else{if(cb&&cb.nextElementSibling)cb.nextElementSibling.className='';}}
  const pg=document.getElementById('cl-prog');if(pg)pg.textContent=`${done} / ${total} completed`;
}

function openNew(stId){
  editId=null;pendingFiles=[];
  document.getElementById('modal-title').textContent='Add New Prospect';
  document.getElementById('del-btn').style.display='none';
  document.getElementById('mcol-l').innerHTML=buildLeft(null,stId||'unaware');
  document.getElementById('mcol-r').innerHTML=buildRight(null);
  renderFileList();
  document.getElementById('ov').classList.add('open');
}
function openEdit(id){
  editId=id;pendingFiles=[];
  const p=prospects.find(x=>x.id===id);
  document.getElementById('modal-title').textContent='Edit — '+p.name;
  document.getElementById('del-btn').style.display='inline-block';
  document.getElementById('mcol-l').innerHTML=buildLeft(p,p.stage);
  document.getElementById('mcol-r').innerHTML=buildRight(p);
  renderFileList();
  document.getElementById('ov').classList.add('open');
}

function saveProspect(){
  const name=document.getElementById('f-name').value.trim();
  const age=parseInt(document.getElementById('f-age').value);
  if(!name||!age){alert('Please enter at least a name and age.');return;}
  const stId=document.getElementById('f-stage').value;
  const checks=CL[stId].map((_,i)=>{const cb=document.getElementById('ck'+i);return cb?cb.checked:false;});
  const rp=document.getElementById('f-period').value;
  const rd=document.getElementById('f-review').value;
  if(editId){
    const p=prospects.find(x=>x.id===editId);
    p.name=name;p.age=age;p.nric=document.getElementById('f-nric').value.trim();
    p.status=document.getElementById('f-status').value;p.risk=document.getElementById('f-risk').value;
    p.first=document.getElementById('f-first').value==='1';p.stage=stId;
    p.notes=document.getElementById('f-notes').value.trim();
    p.reviewPeriod=rp;p.reviewDate=rd;
    if(!p.checks)p.checks={};p.checks[stId]=checks;
    if(!p.files)p.files=[];p.files=[...p.files,...pendingFiles];
  } else {
    const co={};co[stId]=checks;
    prospects.push({id:nextId++,name,age,nric:document.getElementById('f-nric').value.trim(),status:document.getElementById('f-status').value,risk:document.getElementById('f-risk').value,first:document.getElementById('f-first').value==='1',stage:stId,notes:document.getElementById('f-notes').value.trim(),reviewPeriod:rp,reviewDate:rd,checks:co,files:[...pendingFiles]});
  }
  pendingFiles=[];closeModal();renderBoard();
}
function deleteProspect(){if(!confirm('Remove this prospect?'))return;prospects=prospects.filter(p=>p.id!==editId);closeModal();renderBoard();}
function closeModal(){document.getElementById('ov').classList.remove('open');editId=null;}
function ovClick(e){if(e.target.id==='ov')closeModal();}
function filterCards(){filterTerm=document.getElementById('search-input').value;renderBoard();}
function exportData(){
  const rows=[['Name','Age','NRIC','Status','Risk','Stage','First Screener','Review Period','Next Review Date','Files','Notes']];
  prospects.forEach(p=>{const st=STAGES.find(s=>s.id===p.stage);rows.push([p.name,p.age,p.nric,p.status,p.risk,st?st.label:'',p.first?'Yes':'No',PERIOD_LABELS[p.reviewPeriod]||'',p.reviewDate||'',(p.files||[]).length,'"'+(p.notes||'').replace(/"/g,"'")+'"']);});
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(rows.map(r=>r.join(',')).join('\n'));a.download='mammobus_pipeline.csv';a.click();
}
renderBoard();
</script>
</body>
</html>
